name: Bootstrap Milestones

# Manually triggered, idempotent. Run once from the Actions tab
# (or re-run safely any time) to ensure the standard sprint
# milestones exist.

on:
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  create-milestones:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const milestones = [
              { title: "Sprint 1 – MVP", description: "First usable vertical slice: onboarding, one mission, reflection, one insight." },
              { title: "Sprint 2 – AI", description: "Replace scripted conversations and insights with real AI-driven behaviour." },
              { title: "Sprint 3 – Personalisation", description: "Deeper personalisation of Missions and Insights based on accumulated data." },
              { title: "Future", description: "Ideas and work explicitly deferred beyond the current roadmap." },
            ];

            const { data: existing } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existingTitles = new Set(existing.map((m) => m.title));

            for (const m of milestones) {
              if (existingTitles.has(m.title)) {
                core.info(`Milestone already exists, skipping: ${m.title}`);
                continue;
              }
              await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: m.title,
                description: m.description,
              });
              core.info(`Created milestone: ${m.title}`);
            }
